<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Platform Dispatcher</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="page-shell page-company">
    <div id="react-root"></div>

    <script>
        window.__COMPANY_DATA__ = {
            workers: [
                {% for worker in workers %}
                {
                    id: {{ worker.id }},
                    username: {{ worker.username | tojson }}
                }{% if not loop.last %},{% endif %}
                {% endfor %}
            ],
            orders: [
                {% for order in orders %}
                {
                    id: {{ order.id }},
                    worker_id: {{ order.worker_id }},
                    status: {{ order.status | tojson }}
                }{% if not loop.last %},{% endif %}
                {% endfor %}
            ]
        };
    </script>
    <script type="text/babel" data-presets="react" src="{{ url_for('static', filename='js/company.js') }}"></script>
</body>
</html>
