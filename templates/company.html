<!DOCTYPE html>
<html>
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto bg-white rounded-xl shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-6">Platform Dispatcher (Swiggy/Zomato View)</h1>

        <div class="mb-8">
            <h2 class="text-lg font-bold mb-4">Available Fleet</h2>
            <table class="w-full text-left bg-gray-50 rounded">
                <tr class="border-b"><th class="p-3">Worker ID</th><th class="p-3">Name</th><th class="p-3">Action</th></tr>
                {% for worker in workers %}
                <tr>
                    <td class="p-3">#{{ worker.id }}</td>
                    <td class="p-3">{{ worker.username }}</td>
                    <td class="p-3">
                        <button onclick="dispatchOrder({{ worker.id }}, 28.6139, 77.2090, 28.5355, 77.2410)" class="bg-blue-600 text-white px-3 py-1 rounded text-sm">
                            Assign High-Risk Order (Gridlock Zone)
                        </button>
                    </td>
                </tr>
                {% endfor %}
            </table>
        </div>
    </div>

    <script>
        async function dispatchOrder(workerId, oLat, oLon, dLat, dLon) {
            await fetch('/api/dispatch_order', {
                method: 'POST', headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({worker_id: workerId, origin_lat: oLat, origin_lon: oLon, dest_lat: dLat, dest_lon: dLon})
            });
            alert("Order sent to worker's app!");
            location.reload();
        }
    </script>
</body>
</html>
