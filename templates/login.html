<!DOCTYPE html>
<html>
<head><script src="https://cdn.tailwindcss.com"></script></head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-xl shadow-lg w-96">
        <h2 class="text-2xl font-bold mb-6 text-center">Gig Shield Login</h2>
        <form method="POST" action="/login">
            <input type="text" name="username" placeholder="Username" class="w-full border p-2 mb-4 rounded" required>
            <input type="password" name="password" placeholder="Password" class="w-full border p-2 mb-6 rounded" required>
            <button type="submit" class="w-full bg-blue-600 text-white font-bold py-2 rounded">Login</button>
        </form>
        <p class="text-xs text-gray-500 mt-4 text-center">Demo Accounts: worker1, admin, company (Pass: 1234)</p>
    </div>
</body>
</html>
