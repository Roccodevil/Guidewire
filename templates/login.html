<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gig Shield Login</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="page-shell page-login">
    <div id="react-root"></div>

    <script>
        window.__LOGIN_DATA__ = {
            flashes: {{ get_flashed_messages() | tojson }},
            login_role: {{ login_role | default(None) | tojson }}
        };
    </script>
    <script type="text/babel" data-presets="react" src="{{ url_for('static', filename='js/login.js') }}"></script>
</body>
</html>
