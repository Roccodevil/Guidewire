<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Admin Console</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="page-shell page-admin">
    <div id="react-root"></div>

    <script>
        window.__ADMIN_DATA__ = {
            total_premiums: {{ total_premiums }},
            total_payouts: {{ total_payouts }},
            net_profit: {{ net_profit }},
            workers: [
                {% for w in workers %}
                {
                    id: {{ w.id }},
                    username: {{ w.username | tojson }},
                    wallet_balance: {{ w.wallet_balance }}
                }{% if not loop.last %},{% endif %}
                {% endfor %}
            ],
            policy_options: [
                {% for opt in policy_options %}
                {
                    id: {{ opt.id }},
                    tier: {{ opt.tier | tojson }},
                    premium: {{ opt.premium }},
                    coverage_limit: {{ opt.coverage_limit }},
                    xai_description: {{ opt.xai_description | tojson }},
                    terms_text: {{ opt.terms_text | tojson }},
                    rules_text: {{ opt.rules_text | tojson }}
                }{% if not loop.last %},{% endif %}
                {% endfor %}
            ],
            claims: [
                {% for claim in claims %}
                {
                    reason: {{ claim.reason | tojson }},
                    payout_amount: {{ claim.payout_amount }},
                    timestamp: {{ claim.timestamp.strftime('%Y-%m-%d %H:%M') | tojson }}
                }{% if not loop.last %},{% endif %}
                {% endfor %}
            ],
            analytics: {{ admin_analytics | tojson }}
        };
    </script>
    <script type="text/babel" data-presets="react" src="{{ url_for('static', filename='js/admin.js') }}"></script>
</body>
</html>
