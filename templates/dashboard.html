<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Worker Hub</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="page-shell page-dashboard">
    <div id="react-root"></div>

    <script>
        window.__DASHBOARD_DATA__ = {
            worker: {
                id: {{ worker.id }},
                username: {{ worker.username | tojson }},
                wallet_balance: {{ worker.wallet_balance }}
            },
            policy: {% if policy %}{
                tier: {{ policy.tier | tojson }},
                total_premium: {{ policy.total_premium }},
                coverage_limit: {{ policy.coverage_limit }},
                coverage_used: {{ policy.coverage_used }},
                terms_text: {{ policy.terms_text | tojson }},
                rules_text: {{ policy.rules_text | tojson }}
            }{% else %}null{% endif %},
            pending_orders: [
                {% for order in pending_orders %}
                {
                    id: {{ order.id }},
                    origin_name: {{ order.origin_name | tojson }},
                    origin_lat: {{ order.origin_lat }},
                    origin_lon: {{ order.origin_lon }},
                    dest_name: {{ order.dest_name | tojson }},
                    dest_lat: {{ order.dest_lat }},
                    dest_lon: {{ order.dest_lon }}
                }{% if not loop.last %},{% endif %}
                {% endfor %}
            ],
            options: [
                {% for opt in options %}
                {
                    tier: {{ opt.tier | tojson }},
                    premium: {{ opt.premium }},
                    coverage_limit: {{ opt.coverage_limit }},
                    xai_description: {{ opt.xai_description | tojson }}
                }{% if not loop.last %},{% endif %}
                {% endfor %}
            ],
            recommended: {{ recommended | tojson }},
            days_left: {{ days_left }},
            time_left_pct: {{ time_left_pct }},
            live_weather: {{ live_weather | tojson }}
        };
    </script>
    <script type="text/babel" data-presets="react" src="{{ url_for('static', filename='js/dashboard.js') }}"></script>
</body>
</html>
